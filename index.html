<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CCC Waste - Eco Dashboard</title>
  
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1GhR1quDqH5UIkMWIygRGM1zT34W3kGOW">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- Theme Bar บนมือถือใช้โทนเขียว Sage สบายตา -->
  <meta name="theme-color" content="#8ba89f">

  <!-- เร่งการดึงข้อมูลล่วงหน้า -->
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="dns-prefetch" href="https://script.google.com">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0; 
      padding: 0;
      width: 100%; 
      height: 100%;
      height: 100dvh; /* ป้องกันแถบ Browser บังหน้าจอบนมือถือ */
      background-color: #8ba89f; /* สีเขียว Sage Green สบายตาตามธีมหน้าเว็บ */
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    }

    .app-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0;
      transition: opacity 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      -webkit-overflow-scrolling: touch;
    }

    /* Loading Screen สไตล์ Eco Luxe */
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: radial-gradient(circle at center, #9bb8ae 0%, #7d9e94 100%);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99;
      transition: opacity 0.4s ease, visibility 0.4s;
    }

    /* Minimal Eco Leaf Loader */
    .eco-loader {
      position: relative;
      width: 44px;
      height: 44px;
      border: 3px solid rgba(255, 255, 255, 0.25);
      border-radius: 50% 0 50% 50%; /* ทรงหยดน้ำ/ใบไม้ */
      border-top-color: #0d3b32; /* เขียว Forest Green */
      animation: ecoSpin 0.9s cubic-bezier(0.4, 0, 0.2, 1) infinite;
    }

    @keyframes ecoSpin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .loading-text {
      color: #ffffff;
      margin-top: 18px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <!-- Loading Screen เรียบหรูสไตล์รักษ์โลก -->
  <div id="loading-screen">
    <div class="eco-loader"></div>
    <div class="loading-text">กำลังโหลด...</div>
  </div>

  <div class="app-container">
    <iframe
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbzs48akenWyIaw6AhmKX7MBaDUqKZObyOCW5WZsG5-aMfb1r6KzoQLZf57FEAQNlX8z/exec"
      allow="geolocation; camera; microphone"
      scrolling="yes"
      onload="hideLoader()"> 
    </iframe>
  </div>

  <script>
    function hideLoader() {
      const loader = document.getElementById('loading-screen');
      const frame = document.getElementById('appFrame');
      
      frame.style.opacity = '1';
      loader.style.opacity = '0';
      
      setTimeout(function() {
        loader.style.visibility = 'hidden';
      }, 400);
    }

    // Safety Timeout: หากเน็ตช้าเกิน 4 วินาที ให้เข้าหน้าเว็บทันที
    setTimeout(hideLoader, 4000);

    // รองรับการส่งค่าความสูง frame จาก Google Apps Script
    window.addEventListener('message', function(e) {
      if (e.data && e.data.frameHeight) {
        var frame = document.getElementById('appFrame');
        if (frame) {
          frame.style.height = e.data.frameHeight + 'px';
        }
      }
    }, false);

    // ป้องกัน Pinch-zoom บนสมาร์ตโฟน
    document.addEventListener('touchmove', function(e) {
      if (e.scale && e.scale !== 1) { 
        e.preventDefault(); 
      }
    }, { passive: false });
  </script>

</body>
</html>
