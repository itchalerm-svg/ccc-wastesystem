<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CCC Waste</title>
  
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1GhR1quDqH5UIkMWIygRGM1zT34W3kGOW">
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <!-- ปรับสี Theme Bar บนมือถือให้เข้ากับธีมเขียว -->
  <meta name="theme-color" content="#0b3b32">

  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="dns-prefetch" href="https://script.google.com">

  <style>
    html, body {
      margin: 0; 
      padding: 0;
      width: 100%; 
      height: 100%;
      height: 100dvh; /* รองรับ Responsive Viewport บนมือถือ */
      background-color: #0b3b32; /* เปลี่ยนเป็นสีเขียวธีมเดียวกับแอป */
      overflow: hidden;
    }

    .app-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0;
      transition: opacity 0.3s ease;
      -webkit-overflow-scrolling: touch; /* ให้ไถหน้าจอบน iOS ลื่นขึ้น */
    }

    /* Loading Screen โทนเขียวเข้ม */
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #0b3b32;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99;
      transition: opacity 0.4s ease;
    }

    .loader {
      width: 45px; 
      height: 45px;
      border: 4px solid rgba(255, 255, 255, 0.2);
      border-top: 4px solid #00e6a8; /* สีหมุนตัดโทนสว่าง */
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { 
      0% { transform: rotate(0deg); } 
      100% { transform: rotate(360deg); } 
    }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="loader"></div>
    <div style="color: #ffffff; margin-top: 15px; font-family: sans-serif; font-size: 14px; letter-spacing: 1px;">กำลังโหลดระบบ...</div>
  </div>

  <div class="app-container">
    <iframe
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbzs48akenWyIaw6AhmKX7MBaDUqKZObyOCW5WZsG5-aMfb1r6KzoQLZf57FEAQNlX8z/exec"
      allow="geolocation; camera; microphone"
      scrolling="yes"
      onload="hideLoader()"> 
    </iframe>
  </div>

  <script>
    function hideLoader() {
      const loader = document.getElementById('loading-screen');
      const frame = document.getElementById('appFrame');
      
      frame.style.opacity = '1';
      loader.style.opacity = '0';
      
      setTimeout(function() {
        loader.style.display = 'none';
      }, 400);
    }

    // รับค่าส่วนสูงกรณี Google Apps Script ส่งความสูงมา
    window.addEventListener('message', function(e) {
      if (e.data && e.data.frameHeight) {
        var frame = document.getElementById('appFrame');
        if (frame) {
          frame.style.height = e.data.frameHeight + 'px';
        }
      }
    }, false);

    // ป้องกันการขยายหน้าจอแบบ Pinch-zoom บนมือถือ
    document.addEventListener('touchmove', function(e) {
      if (e.scale && e.scale !== 1) { 
        e.preventDefault(); 
      }
    }, { passive: false });
  </script>

</body>
</html>
