<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CHALERMCHAICHAN SYSTEM</title>
  
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#ef4d4d">

  <style>
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background-color: #FFF0F5; 
      overflow: hidden;
    }

    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: #FFF0F5; 
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99;
    }

    .loader {
      width: 45px; height: 45px;
      border: 4px solid rgba(0,0,0,0.1);
      border-top: 4px solid #ef4d4d; /* เปลี่ยนเป็นสีแดงตามธีมธีมแอป */
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading-screen">
    <div class="loader"></div>
    <!-- แก้สีตัวอักษรเป็นสีเทาเข้ม (#333) เพื่อให้มองเห็นบนพื้นหลังสีชมพูอ่อนได้ชัดเจน -->
    <div style="color: #333333; margin-top: 15px; font-family: sans-serif; font-size: 14px; letter-spacing: 1px; font-weight: bold;">กำลังเข้าสู่ระบบปลอดภัย...</div>
  </div>

  <script>
    // ใช้ระบบตรวจจับ: หากระบบบล็อก iFrame หรือเปิดผ่าน iPhone/มือถือ ให้ส่งต่อหน้าจอทันทีเพื่อไม่ให้ระบบค้าง
    var webAppUrl = "https://script.google.com/macros/s/AKfycbwZMdgd-8F0NYiTM9J7qADh4yDgFHAb8aFJcdYUqPxnXS440jrjjmsN78-hx3SylcCv/exec";
    
    // ทำการเปลี่ยนทิศทางหน้าเว็บไปยัง Google Apps Script โดยตรง
    window.location.href = webAppUrl;
  </script>

</body>
</html>
