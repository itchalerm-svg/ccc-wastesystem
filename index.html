<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>CCC Waste DispenserService</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="https://lh3.googleusercontent.com/d/1GhR1quDqH5UIkMWIygRGM1zT34W3kGOW">
  
  <!-- PWA & Mobile Web App Capabilities -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#133e35">

  <!-- Resource Optimization Hints (เร่งการเชื่อมต่อให้เร็วที่สุด) -->
  <link rel="preconnect" href="https://script.google.com" crossorigin>
  <link rel="dns-prefetch" href="https://script.google.com">
  <link rel="preload" as="document" href="https://script.google.com/macros/s/AKfycbzs48akenWyIaw6AhmKX7MBaDUqKZObyOCW5WZsG5-aMfb1r6KzoQLZf57FEAQNlX8z/exec">

  <style>
    :root {
      --bg-gradient: radial-gradient(circle at center, #1b4d3e 0%, #0b2923 100%);
      --accent-color: #52b788;
      --text-gold: #e2c044;
      --text-light: #f4f7f6;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0; 
      padding: 0;
      width: 100%; 
      height: 100%;
      height: 100dvh;
      background-color: #0b2923;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'SF Pro Display', Roboto, Helvetica, Arial, sans-serif;
    }

    .app-container {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
      opacity: 0;
      transition: opacity 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      -webkit-overflow-scrolling: touch;
    }

    /* Loading Screen สไตล์ Executive Eco-Luxe */
    #loading-screen {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: var(--bg-gradient);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 999;
      transition: opacity 0.5s ease, visibility 0.5s;
    }

    /* Eco Brand Container */
    .brand-wrapper {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      padding: 30px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.03);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
    }

    /* Minimal Modern Loader Ring */
    .loader-ring {
      position: relative;
      width: 56px;
      height: 56px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .loader-ring::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: var(--accent-color);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* SVG Eco Icon inside Loader */
    .eco-icon {
      width: 24px;
      height: 24px;
      fill: var(--accent-color);
    }

    .brand-title {
      color: var(--text-light);
      font-size: 16px;
      font-weight: 600;
      letter-spacing: 2px;
      margin: 0;
      text-transform: uppercase;
    }

    .loading-status {
      color: rgba(244, 247, 246, 0.6);
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

  <!-- Loading Screen พรีเมียม รักษ์โลก -->
  <div id="loading-screen">
    <div class="brand-wrapper">
      <div class="loader-ring">
        <!-- Inline Leaf SVG (ไม่ต้องรอดาวน์โหลดรูป) -->
        <svg class="eco-icon" viewBox="0 0 24 24">
          <path d="M17,8C8,10 59,16.17 3.82,21.34L5.71,22L6.66,19.7C12,14.7 15,9 17,8M17,3C12,3 7,8 7,13C8,13 10,12 11,11C12.5,9.5 15,7.5 17,7.5C19,7.5 20.5,9 20.5,11C20.5,13 18.5,15.5 17,17C16,18 15,20 15,21C20,21 22,15 22,11C22,6.5 19.5,3 17,3Z"/>
        </svg>
      </div>
      <div class="brand-title">CCC Waste</div>
      <div class="loading-status">กำลังโหลด...</div>
    </div>
  </div>

  <div class="app-container">
    <iframe
      id="appFrame"
      src="https://script.google.com/macros/s/AKfycbzs48akenWyIaw6AhmKX7MBaDUqKZObyOCW5WZsG5-aMfb1r6KzoQLZf57FEAQNlX8z/exec"
      allow="geolocation; camera; microphone"
      scrolling="yes"
      onload="hideLoader()"> 
    </iframe>
  </div>

  <script>
    let isLoaded = false;

    function hideLoader() {
      if (isLoaded) return;
      isLoaded = true;

      const loader = document.getElementById('loading-screen');
      const frame = document.getElementById('appFrame');
      
      frame.style.opacity = '1';
      loader.style.opacity = '0';
      
      setTimeout(function() {
        loader.style.visibility = 'hidden';
      }, 500);
    }

    // Safety Fallback: หากสัญญาณอินเทอร์เน็ตช้า ให้ตัดเข้าหน้าเว็บภายใน 3.5 วินาที
    setTimeout(hideLoader, 3500);

    // Dynamic Height Adjustment จาก Google Apps Script
    window.addEventListener('message', function(e) {
      if (e.data && e.data.frameHeight) {
        var frame = document.getElementById('appFrame');
        if (frame) {
          frame.style.height = e.data.frameHeight + 'px';
        }
      }
    }, false);

    // Disable Pinch-Zoom บนอุปกรณ์เคลื่อนที่
    document.addEventListener('touchmove', function(e) {
      if (e.scale && e.scale !== 1) { 
        e.preventDefault(); 
      }
    }, { passive: false });
  </script>

</body>
</html>
